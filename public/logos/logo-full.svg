<svg width="1200" height="240" viewBox="0 0 220 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&amp;display=swap');
    .text {
      font-family: 'Montserrat', system-ui, sans-serif;
      font-weight: 700;
      font-size: 24px;
      letter-spacing: -0.03em;
    }
  </style>

  <!-- Dark pill background -->
  <rect width="220" height="44" rx="22" fill="#1C1C2E" />

